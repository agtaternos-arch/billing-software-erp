<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Torvix POS Core</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #2563eb;
            --neon-purple: #7c3aed;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
        }
        
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.05), transparent 30%);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .brand-logo i {
            font-size: 48px;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }
        
        .brand-logo h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .form-label {
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: #fff;
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .btn-neon {
            background: var(--neon-blue);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn-neon:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }
        
        .demo-box {
            background: rgba(37, 99, 235, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
            border-left: 4px solid var(--neon-blue);
        }
        
        .demo-box small {
            display: block;
            color: #64748b;
            margin-bottom: 5px;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-atom"></i>
            <h2>TORVIX</h2>
            <p class="text-secondary small mt-1">Supermarket Billing</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }} small mb-3 border-0" style="background: rgba(220, 38, 38, 0.1); color: var(--neon-red);">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
            
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Username" required autocomplete="username">
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-neon">LOGIN</button>
        </form>
        
        <div class="demo-box">
            <small><i class="fas fa-info-circle me-1"></i> TEST LOGIN:</small>
            <div class="d-flex justify-content-between small">
                <span>User: <strong>admin</strong></span>
                <span>Password: <strong>admin@123456</strong></span>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
