<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Torvix POS Core</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #2563eb;
            --neon-purple: #7c3aed;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.08);
        }
        
        body {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 234, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 236, 0.05), transparent 30%);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .brand-logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .brand-logo i {
            font-size: 40px;
            color: var(--neon-blue);
            margin-bottom: 8px;
        }
        
        .brand-logo h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 2px;
            margin: 0;
            font-size: 24px;
        }
        
        .form-label {
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px 15px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background: #fff;
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        
        .btn-neon {
            background: var(--neon-blue);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .btn-neon:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        
        .login-link a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="brand-logo">
            <i class="fas fa-user-plus"></i>
            <h2>CREATE ACCOUNT</h2>
            <p class="text-secondary small mt-1">Registraton</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="alert alert-danger small mb-3 border-0" style="background: rgba(220, 38, 38, 0.1); color: var(--neon-red);">
                Please correct the errors below.
            </div>
            {% endif %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">User Name</label>
                    <input type="text" name="username" class="form-control" placeholder="username" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="email@torvix.com" required>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select">
                        <option value="cashier">Cashier</option>
                        <option value="manager">Manager</option>
                        <option value="owner">Owner</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="+91 XXXX">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-neon">SIGN UP</button>
        </form>
        
        <div class="login-link">
            Already have an active session? <a href="{% url 'accounts:login' %}">Connect Here</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
