{% extends 'base.html' %}

{% block title %}Add Customer Category - ERP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeInDown">
    <h1 class="brand-font" style="color: var(--neon-purple);">
        <a href="{% url 'customers:category_list' %}" class="text-decoration-none" style="color: #64748b;"><i class="fas fa-arrow-left me-2"></i></a>
        Add Customer Category
    </h1>
</div>

<div class="row justify-content-center animate__animated animate__fadeInUp">
    <div class="col-md-6 text-start">
        <div class="card shadow-lg glass-panel" style="border-radius: 15px; border: 1px solid rgba(0,0,0,0.05);">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
                <h5 class="fw-bold text-primary mb-0"><i class="fas fa-tags me-2"></i> Category Details</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label text-secondary small fw-bold">CATEGORY NAME <span class="text-danger">*</span></label>
                            {{ form.name }}
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label text-secondary small fw-bold">DISCOUNT (%)</label>
                            <div class="input-group">
                                {{ form.discount_percent }}
                                <span class="input-group-text bg-light"><i class="fas fa-percent"></i></span>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label text-secondary small fw-bold">DESCRIPTION</label>
                            {{ form.description }}
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-5 gap-2 border-top pt-4">
                        <a href="{% url 'customers:category_list' %}" class="btn btn-light px-4" style="border-radius: 8px;">Cancel</a>
                        <button type="submit" class="btn btn-neon-purple px-4 fw-bold" style="border-radius: 8px;">Save Category</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
