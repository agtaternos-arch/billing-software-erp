<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo { width: 150px; margin-bottom: 20px; }
        .branding { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #3b82f6; }
        .status { margin-top: 10px; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="branding">TORVIX BILLS</div>
    <div class="status">Starting secure database and server...</div>
</body>
</html>
